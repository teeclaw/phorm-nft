    <text x="80" y="51" font-family="system-ui" font-size="18" font-weight="700" fill="#0a0a0a">Infrastructure</text>
    <text x="20" y="95" font-family="system-ui" font-size="13" fill="#525252">• Memory architecture</text>
    <text x="20" y="115" font-family="system-ui" font-size="13" fill="#525252">• Multi-agent coordination</text>
    <text x="20" y="135" font-family="system-ui" font-size="13" fill="#525252">• Skill management</text>
