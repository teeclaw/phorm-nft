    <rect width="320" height="160" rx="12" fill="#ddd6fe" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="40" cy="40" r="24" fill="#8b5cf6"/>
    <text x="40" y="48" font-family="system-ui" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">8</text>
