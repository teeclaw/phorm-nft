    <text x="40" y="48" font-family="system-ui" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">7</text>
    <text x="80" y="40" font-family="system-ui" font-size="18" font-weight="700" fill="#0a0a0a">Development</text>
    <text x="80" y="62" font-family="system-ui" font-size="18" font-weight="700" fill="#0a0a0a">Operations</text>
    <text x="20" y="95" font-family="system-ui" font-size="13" fill="#525252">• Code deployments</text>
    <text x="20" y="115" font-family="system-ui" font-size="13" fill="#525252">• Git commit discipline</text>
    <text x="20" y="135" font-family="system-ui" font-size="13" fill="#525252">• Production safety patterns</text>
