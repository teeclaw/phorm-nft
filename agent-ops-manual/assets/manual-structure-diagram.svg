  <!-- Subtle connecting lines (optional visual flow) -->
  <line x1="240" y1="280" x2="240" y2="320" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="600" y1="280" x2="600" y2="320" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="960" y1="280" x2="960" y2="320" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="240" y1="480" x2="240" y2="520" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="600" y1="480" x2="600" y2="520" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="960" y1="480" x2="960" y2="520" stroke="#e5e7eb" stroke-width="2"/>
</svg>
