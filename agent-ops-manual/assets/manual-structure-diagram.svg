    <text x="20" y="95" font-family="system-ui" font-size="13" fill="#525252">• Monetization strategies</text>
    <text x="20" y="115" font-family="system-ui" font-size="13" fill="#525252">• Research & data sources</text>
    <text x="20" y="135" font-family="system-ui" font-size="13" fill="#525252">• Transparency dashboards</text>
