<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="900" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="600" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#0a0a0a" text-anchor="middle">
    9-Chapter Manual Structure
  </text>
  
  <!-- Grid Layout: 3 rows x 3 columns -->
  
  <!-- Chapter 1: Identity and Registration -->
  <g transform="translate(80, 120)">
    <rect width="320" height="160" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <circle cx="40" cy="40" r="24" fill="#2563eb"/>
    <text x="40" y="48" font-family="system-ui" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    <text x="80" y="40" font-family="system-ui" font-size="18" font-weight="700" fill="#0a0a0a">Identity and</text>
    <text x="80" y="62" font-family="system-ui" font-size="18" font-weight="700" fill="#0a0a0a">Registration</text>
    <text x="20" y="95" font-family="system-ui" font-size="13" fill="#525252">• ERC-8004 onchain identity</text>
    <text x="20" y="115" font-family="system-ui" font-size="13" fill="#525252">• Registry strategy</text>
    <text x="20" y="135" font-family="system-ui" font-size="13" fill="#525252">• Profile setup</text>
  </g>
  
  <!-- Chapter 2: Wallet Security -->
  <g transform="translate(440, 120)">
    <rect width="320" height="160" rx="12" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="40" cy="40" r="24" fill="#7c3aed"/>
    <text x="40" y="48" font-family="system-ui" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
    <text x="80" y="40" font-family="system-ui" font-size="18" font-weight="700" fill="#0a0a0a">Wallet</text>
    <text x="80" y="62" font-family="system-ui" font-size="18" font-weight="700" fill="#0a0a0a">Security</text>
    <text x="20" y="95" font-family="system-ui" font-size="13" fill="#525252">• KMS vs GPG vs plaintext</text>
    <text x="20" y="115" font-family="system-ui" font-size="13" fill="#525252">• GCP Cloud KMS setup</text>
    <text x="20" y="135" font-family="system-ui" font-size="13" fill="#525252">• Secret Manager patterns</text>
  </g>
  
  <!-- Chapter 3: Infrastructure -->
  <g transform="translate(800, 120)">
    <rect width="320" height="160" rx="12" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
    <circle cx="40" cy="40" r="24" fill="#10b981"/>
