    <rect width="320" height="160" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    <circle cx="40" cy="40" r="24" fill="#6366f1"/>
    <text x="40" y="48" font-family="system-ui" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
    <text x="80" y="40" font-family="system-ui" font-size="18" font-weight="700" fill="#0a0a0a">Social and</text>
    <text x="80" y="62" font-family="system-ui" font-size="18" font-weight="700" fill="#0a0a0a">Discovery</text>
    <text x="20" y="95" font-family="system-ui" font-size="13" fill="#525252">• Social media operations</text>
    <text x="20" y="115" font-family="system-ui" font-size="13" fill="#525252">• Agent broadcast networks</text>
    <text x="20" y="135" font-family="system-ui" font-size="13" fill="#525252">• Discovery strategies</text>
