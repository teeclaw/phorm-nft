<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="600" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#0a0a0a" text-anchor="middle">
    7-Part Manual Structure
  </text>
  
  <!-- Part 1: Identity & Registration -->
  <g transform="translate(100, 120)">
    <rect width="300" height="140" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <circle cx="40" cy="40" r="24" fill="#2563eb"/>
    <text x="40" y="48" font-family="system-ui" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    <text x="80" y="45" font-family="system-ui" font-size="20" font-weight="700" fill="#0a0a0a">Identity & Registration</text>
    <text x="20" y="80" font-family="system-ui" font-size="14" fill="#525252">• ERC-8004 onchain identity</text>
    <text x="20" y="100" font-family="system-ui" font-size="14" fill="#525252">• Multi-registry strategy</text>
    <text x="20" y="120" font-family="system-ui" font-size="14" fill="#525252">• Agent passports</text>
  </g>
  
  <!-- Part 2: Infrastructure -->
  <g transform="translate(450, 120)">
    <rect width="300" height="140" rx="12" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="40" cy="40" r="24" fill="#7c3aed"/>
    <text x="40" y="48" font-family="system-ui" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
    <text x="80" y="45" font-family="system-ui" font-size="20" font-weight="700" fill="#0a0a0a">Infrastructure</text>
    <text x="20" y="80" font-family="system-ui" font-size="14" fill="#525252">• KMS wallet security</text>
    <text x="20" y="100" font-family="system-ui" font-size="14" fill="#525252">• Memory architecture</text>
    <text x="20" y="120" font-family="system-ui" font-size="14" fill="#525252">• Multi-agent coordination</text>
  </g>
  
  <!-- Part 3: Economy -->
  <g transform="translate(800, 120)">
    <rect width="300" height="140" rx="12" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
    <circle cx="40" cy="40" r="24" fill="#10b981"/>
    <text x="40" y="48" font-family="system-ui" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
    <text x="80" y="45" font-family="system-ui" font-size="20" font-weight="700" fill="#0a0a0a">Agent Economy</text>
    <text x="20" y="80" font-family="system-ui" font-size="14" fill="#525252">• A2A protocol integration</text>
    <text x="20" y="100" font-family="system-ui" font-size="14" fill="#525252">• x402 payment rails</text>
    <text x="20" y="120" font-family="system-ui" font-size="14" fill="#525252">• Attestations & transparency</text>
  </g>
  
  <!-- Part 4: Automation -->
  <g transform="translate(100, 310)">
    <rect width="300" height="140" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="40" cy="40" r="24" fill="#f59e0b"/>
    <text x="40" y="48" font-family="system-ui" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
    <text x="80" y="45" font-family="system-ui" font-size="20" font-weight="700" fill="#0a0a0a">Automation</text>
    <text x="20" y="80" font-family="system-ui" font-size="14" fill="#525252">• Cron job orchestration</text>
    <text x="20" y="100" font-family="system-ui" font-size="14" fill="#525252">• Social media operations</text>
    <text x="20" y="120" font-family="system-ui" font-size="14" fill="#525252">• Agent broadcast networks</text>
  </g>
  
  <!-- Part 5: Development -->
  <g transform="translate(450, 310)">
    <rect width="300" height="140" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <circle cx="40" cy="40" r="24" fill="#ef4444"/>
    <text x="40" y="48" font-family="system-ui" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
    <text x="80" y="45" font-family="system-ui" font-size="20" font-weight="700" fill="#0a0a0a">Development</text>
    <text x="20" y="80" font-family="system-ui" font-size="14" fill="#525252">• Skills & tools ecosystem</text>
    <text x="20" y="100" font-family="system-ui" font-size="14" fill="#525252">• Code deployments</text>
    <text x="20" y="120" font-family="system-ui" font-size="14" fill="#525252">• Production safety patterns</text>
  </g>
  
  <!-- Part 6: Revenue -->
  <g transform="translate(800, 310)">
    <rect width="300" height="140" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    <circle cx="40" cy="40" r="24" fill="#6366f1"/>
    <text x="40" y="48" font-family="system-ui" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
    <text x="80" y="45" font-family="system-ui" font-size="20" font-weight="700" fill="#0a0a0a">Revenue & Business</text>
    <text x="20" y="80" font-family="system-ui" font-size="14" fill="#525252">• Monetization strategies</text>
    <text x="20" y="100" font-family="system-ui" font-size="14" fill="#525252">• Transparency dashboards</text>
    <text x="20" y="120" font-family="system-ui" font-size="14" fill="#525252">• Research & data sources</text>
  </g>
  
  <!-- Part 7: Advanced -->
  <g transform="translate(275, 500)">
    <rect width="650" height="140" rx="12" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    <circle cx="40" cy="40" r="24" fill="#ec4899"/>
    <text x="40" y="48" font-family="system-ui" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">7</text>
    <text x="80" y="45" font-family="system-ui" font-size="20" font-weight="700" fill="#0a0a0a">Advanced Patterns (Bonus)</text>
    <text x="20" y="80" font-family="system-ui" font-size="14" fill="#525252">• Security & safety protocols</text>
    <text x="20" y="100" font-family="system-ui" font-size="14" fill="#525252">• Scaling multi-agent teams</text>
    <text x="20" y="120" font-family="system-ui" font-size="14" fill="#525252">• Advanced coordination patterns</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="700" font-family="system-ui" font-size="16" fill="#737373" text-anchor="middle">
    18 Chapters • 80-100 Pages • From Zero to Paid Services in 60 Days
  </text>
  
  <!-- Connection lines (subtle) -->
  <line x1="250" y1="260" x2="250" y2="310" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="600" y1="260" x2="600" y2="310" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="950" y1="260" x2="950" y2="310" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="250" y1="450" x2="450" y2="500" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="600" y1="450" x2="600" y2="500" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="950" y1="450" x2="750" y2="500" stroke="#e5e7eb" stroke-width="2"/>
</svg>
