    <text x="20" y="95" font-family="system-ui" font-size="13" fill="#525252">• Cron job orchestration</text>
    <text x="20" y="115" font-family="system-ui" font-size="13" fill="#525252">• Attestations & transparency</text>
    <text x="20" y="135" font-family="system-ui" font-size="13" fill="#525252">• Public accountability</text>
